# Bluetooth settings
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_CTLR=y
CONFIG_BT_CTLR_PHY=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_CTLR_PHY_CODED=y

# Increase buffer size for better stability
CONFIG_BT_BUF_ACL_RX_SIZE=27
CONFIG_BT_BUF_ACL_TX_SIZE=27

# HID settings
CONFIG_BT_HID=y
CONFIG_BT_HID_KEYBOARD=y

# Settings storage
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FCB=y
CONFIG_FCB=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# Power management
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# Increase stack size
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Enable USB
CONFIG_USB=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_HID=y
CONFIG_USB_HID_KEYBOARD=y
CONFIG_USB_CDC_ACM=y

# OLED display settings (SSD1306)
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_SSD1306_SH1106_COMPATIBLE=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Widget settings
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# Keyboard name
CONFIG_ZMK_KEYBOARD_NAME="Silakka54"

# Studio support
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Fix for Mac compatibility
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=y
CONFIG_BT_CTLR_TX_BUFFERS=2
CONFIG_BT_CTLR_TX_BUFFER_SIZE=27
CONFIG_BT_CTLR_RX_BUFFERS=2
CONFIG_BT_CTLR_RX_BUFFER_SIZE=27
CONFIG_BT_CTLR_CONN_RX_BUFFERS=2

# Additional Mac compatibility
CONFIG_BT_CTLR_ASSERT_HANDLER=n
CONFIG_BT_CTLR_PHY_UPDATE=n

# Logging (отключить для экономии памяти)
CONFIG_LOG=n
CONFIG_ZMK_LOG_LEVEL_DBG=n
CONFIG_ZMK_LOG_LEVEL_INF=n

# iPhone оптимизация
CONFIG_BT_CTLR_ADV_EXT=n
CONFIG_BT_CTLR_ADV_INDICATION=n
CONFIG_BT_CTLR_ADV_SCAN_RSP=n